# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: \.(js|ts|jsx|tsx)$
        additional_dependencies:
          - eslint@8.56.0
          - eslint-config-prettier@9.1.0
          - @typescript-eslint/eslint-plugin@6.18.0
          - @typescript-eslint/parser@6.18.0

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(js|ts|jsx|tsx|json|yaml|yml|md)$
        args: ['--write']

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--fix']

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-d', '{extends: default, rules: {line-length: disable}}']

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: ['--ignore', 'DL3006']

  - repo: https://github.com/rhysd/actionlint
    rev: v1.6.26
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks-docker
        args: ['detect', '--source', '.', '--verbose']

  - repo: local
    hooks:
      - id: npm-test
        name: npm test
        entry: npm test
        language: system
        files: \.(js|ts)$
        pass_filenames: false
        stages: [push]

      - id: check-env-example
        name: Check .env.example
        entry: python3 -c "import os; exit(0 if os.path.exists('.env.example') else 1)"
        language: system
        files: ^\.env\.example$
        pass_filenames: false

      - id: security-scan
        name: Security scan
        entry: npm run security:scan
        language: system
        files: \.(js|ts|json|yaml)$
        pass_filenames: false
        stages: [push]
