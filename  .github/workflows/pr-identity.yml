File: .github/workflows/pr-identity.yml

`yaml
name: PR Identity Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  pr-identity:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title and body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || "";
            const body = pr.body || "";

            if (title.length < 10) {
              core.setFailed("PR title too short. Use a descriptive, governance-grade title.");
            }

            if (!body || body.length < 20) {
              core.setFailed("PR body too short. Describe intent, scope, and impact.");
            }

            const hasIssueRef = /#\d+/.test(body);
            if (!hasIssueRef) {
              core.warning("PR body does not reference an issue (e.g., #123). Consider linking one.");
            }
`