version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    versioning-strategy: auto
    reviewers:
      - "@gitdigital-products/core-team"
    assignees:
      - "@gitdigital-products/engineering-team"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
    ignore:
      - dependency-name: "express"
        versions: ["5.x"]
      - dependency-name: "react"
        versions: ["19.x"]
    groups:
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "eslint*"
          - "prettier*"
          - "@types/*"
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
        exclude-patterns:
          - "eslint*"
          - "prettier*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "@gitdigital-products/ops-team"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "@gitdigital-products/ops-team"
    labels:
      - "dependencies"
      - "docker"

  # Enable version updates for Python (if using Python scripts)
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
